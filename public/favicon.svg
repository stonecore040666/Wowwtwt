<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="26" fill="#000c1a"/>

  <!-- stride=26, block=22, start=12 -->
  <!-- cols: 12,38,64,90,116,142  rows: 12,38,64,90,116,142 -->

  <!-- I piece (cyan) — row2, cols 0-3 -->
