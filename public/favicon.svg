  <rect x="142" y="116" width="22" height="22" rx="3" fill="#0080f0" stroke="#60c0ff" stroke-width="1"/>
  <rect x="90" y="142" width="22" height="22" rx="3" fill="#0080f0" stroke="#60c0ff" stroke-width="1"/>
  <rect x="116" y="142" width="22" height="22" rx="3" fill="#0080f0" stroke="#60c0ff" stroke-width="1"/>
